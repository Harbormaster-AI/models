      relations:
        - name: "performanceReview"
          type: "PerformanceReview"
          multiplicity: "ManyToOne"

    - name: "BenefitPlan"
      data:
        - name: "benefitPlanCode"
        - name: "name"

      relations:
        - name: "enrollments"
          type: "BenefitEnrollment"
          multiplicity: "OneToMany"

    - name: "BenefitEnrollment"
      data:
        - name: "enrollmentNumber"
        - name: "effectiveDate"

      relations:
        - name: "employee"
          type: "Employee"
          multiplicity: "ManyToOne"

        - name: "benefitPlan"
          type: "BenefitPlan"
          multiplicity: "ManyToOne"

    - name: "LeaveRequest"
      data:
        - name: "requestNumber"
        - name: "startDate"
        - name: "endDate"

      relations:
        - name: "employee"
          type: "Employee"
          multiplicity: "ManyToOne"

    - name: "PayrollRecord"
      data:
        - name: "payrollNumber"
        - name: "payDate"

      relations:
        - name: "employee"
          type: "Employee"
          multiplicity: "ManyToOne"

    - name: "TrainingCourse"
      data:
        - name: "courseCode"
        - name: "name"

    - name: "TrainingEnrollment"
      data:
        - name: "trainingEnrollmentNumber"

      relations:
        - name: "employee"
          type: "Employee"
          multiplicity: "ManyToOne"

        - name: "trainingCourse"
          type: "TrainingCourse"
          multiplicity: "ManyToOne"

    - name: "Certification"
      data:
        - name: "certificationCode"
        - name: "name"

    - name: "EmployeeCertification"
      data:
        - name: "employeeCertificationNumber"

      relations:
        - name: "employee"
          type: "Employee"
          multiplicity: "ManyToOne"

        - name: "certification"
          type: "Certification"
          multiplicity: "ManyToOne"

    - name: "Organization"
      data:
