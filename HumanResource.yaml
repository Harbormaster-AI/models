  ```yaml
  valueObjects:

    - name: "PersonName"
      data:
        - name: "firstName"
        - name: "middleName"
        - name: "lastName"

    - name: "Address"
      data:
        - name: "addressLine1"
        - name: "addressLine2"
        - name: "city"
        - name: "state"
        - name: "postalCode"
        - name: "country"

    - name: "ContactInformation"
      data:
        - name: "email"
        - name: "phoneNumber"
        - name: "mobileNumber"

    - name: "Compensation"
      data:
        - name: "salary"
        - name: "currency"
        - name: "payFrequency"

    - name: "DateRange"
      data:
        - name: "startDate"
        - name: "endDate"

  entities:

    - name: "Employee"
      data:
        - name: "employeeNumber"
        - name: "employeeIdentifier"
        - name: "hireDate"
        - name: "employmentStatus"
          type: "EmploymentStatus"

      relations:
        - name: "department"
          type: "Department"
          multiplicity: "ManyToOne"

        - name: "position"
          type: "Position"
          multiplicity: "ManyToOne"

        - name: "manager"
          type: "Employee"
          multiplicity: "ManyToOne"

        - name: "performanceReviews"
          type: "PerformanceReview"
          multiplicity: "OneToMany"

        - name: "leaveRequests"
          type: "LeaveRequest"
          multiplicity: "OneToMany"

        - name: "benefitEnrollments"
          type: "BenefitEnrollment"
          multiplicity: "OneToMany"

    - name: "Department"
      data:
        - name: "departmentCode"
        - name: "name"

      relations:
        - name: "employees"
          type: "Employee"
          multiplicity: "OneToMany"

        - name: "positions"
          type: "Position"
          multiplicity: "OneToMany"

    - name: "Position"
      data:
        - name: "positionCode"
        - name: "title"
        - name: "grade"

      relations:
        - name: "department"
          type: "Department"
          multiplicity: "ManyToOne"

    - name: "PerformanceReview"
      data:
        - name: "reviewNumber"
        - name: "reviewDate"
        - name: "overallScore"

      relations:
        - name: "employee"
          type: "Employee"
          multiplicity: "ManyToOne"

    - name: "Goal"
      data:
        - name: "goalNumber"
