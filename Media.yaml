entities:

  - name: MediaCompany
    description: Organization that produces, distributes, or licenses content.

    data:
      - name: name
        type: String
      - name: companyType
        type: MediaCompanyType

    relations:
      - name: brands
        type: MediaBrand
        multiplicity: OneToMany

      - name: contentLibraries
        type: ContentLibrary
        multiplicity: OneToMany

      - name: distributionChannels
        type: DistributionChannel
        multiplicity: OneToMany

  - name: MediaBrand

    data:
      - name: name
        type: String

    relations:
