enums:

  - name: ContentType
    data:
      - name: Article
      - name: Video
      - name: Podcast
      - name: Livestream
      - name: Newsletter

  - name: PublicationStatus
    data:
      - name: Draft
      - name: Review
      - name: Approved
      - name: Published
      - name: Archived

  - name: ContributorType
    data:
      - name: Journalist
      - name: Editor
      - name: Producer
      - name: Photographer
      - name: Host

  - name: DistributionChannelType
    data:
      - name: Website
      - name: MobileApp
      - name: StreamingPlatform
      - name: Broadcast
      - name: SocialMedia

  - name: SubscriptionStatus
    data:
      - name: Active
      - name: Suspended
      - name: Cancelled

valueObjects:

  - name: Money
    data:
      - name: amount
        type: Decimal

      - name: currency
        type: String

  - name: Duration
    data:
      - name: seconds
        type: Integer

  - name: MediaFile
    data:
      - name: url
        type: String

      - name: format
        type: String

      - name: sizeInBytes
        type: Long