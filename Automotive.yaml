entities:

  - name: Manufacturer
    description: Legal entity responsible for designing and producing vehicles.

    data:
      - name: name
        type: String
      - name: legalName
        type: String
      - name: headquartersCountry
        type: String
      - name: website
        type: String

    relations:
      - name: brands
        type: Brand
        multiplicity: OneToMany

      - name: plants
        type: Plant
        multiplicity: OneToMany

      - name: suppliers
        type: Supplier
        multiplicity: ManyToMany

  - name: Brand
    description: Commercial automotive brand.

    data:
      - name: name
        type: String
      - name: marketSegment
        type: MarketSegment

    relations:
      - name: manufacturer
        type: Manufacturer
        multiplicity: ManyToOne

      - name: vehiclePlatforms
        type: VehiclePlatform
        multiplicity: OneToMany

      - name: dealerships
        type: Dealer
        multiplicity: OneToMany

  - name: VehiclePlatform
    description: Shared engineering platform.

    data:
      - name: name
        type: String
      - name: platformCode
        type: String

    relations:
      - name: brand
        type: Brand
        multiplicity: ManyToOne

      - name: vehicleModels
        type: VehicleModel
        multiplicity: OneToMany

  - name: VehicleModel

    data:
      - name: name
        type: String
      - name: vehicleType
        type: VehicleType

    relations:
      - name: platform
        type: VehiclePlatform
        multiplicity: ManyToOne

      - name: modelYears
        type: ModelYear
        multiplicity: OneToMany

  - name: ModelYear

    data:
      - name: year
        type: Integer
      - name: generation
        type: String

    relations:
      - name: vehicleModel
        type: VehicleModel
        multiplicity: ManyToOne

      - name: configurations
        type: VehicleConfiguration
        multiplicity: OneToMany

  - name: VehicleConfiguration

    data:
      - name: trimName
        type: String
      - name: drivetrainType
        type: DrivetrainType

    relations:
      - name: modelYear
        type: ModelYear
        multiplicity: ManyToOne

      - name: engine
        type: Engine
        multiplicity: ManyToOne

      - name: transmission
        type: Transmission
        multiplicity: ManyToOne

      - name: options
        type: VehicleOption
        multiplicity: ManyToMany

      - name: packages
        type: VehiclePackage
        multiplicity: ManyToMany

  - name: VehicleOption

    data:
      - name: code
        type: String
      - name: name
        type: String

    relations:
      - name: configurations
        type: VehicleConfiguration
        multiplicity: ManyToMany

  - name: VehiclePackage

    data:
      - name: name
        type: String
      - name: packageType
        type: PackageType

    relations:
      - name: options
        type: VehicleOption
        multiplicity: ManyToMany

      - name: configurations
        type: VehicleConfiguration
        multiplicity: ManyToMany

  - name: Engine

    data:
      - name: engineCode
        type: String
      - name: fuelType
        type: FuelType
      - name: horsepower
        type: Integer

    relations:
      - name: configurations
        type: VehicleConfiguration
        multiplicity: OneToMany

  - name: Transmission

    data:
      - name: transmissionCode
        type: String
      - name: transmissionType
        type: TransmissionType

    relations:
      - name: configurations
        type: VehicleConfiguration
        multiplicity: OneToMany

  - name: Component

    data:
      - name: componentNumber
        type: String
      - name: name
        type: String
      - name: componentType
        type: ComponentType

    relations:
      - name: supplier
        type: Supplier
        multiplicity: ManyToOne

  - name: Supplier

    data:
      - name: name
        type: String
      - name: supplierTier
        type: SupplierTier

    relations:
      - name: manufacturers
        type: Manufacturer
        multiplicity: ManyToMany

      - name: components
        type: Component
        multiplicity: OneToMany

  - name: Plant

    data:
      - name: name
        type: String
      - name: plantCode
        type: String

    relations:
      - name: manufacturer
        type: Manufacturer
        multiplicity: ManyToOne

      - name: productionLines
        type: ProductionLine
        multiplicity: OneToMany

      - name: warehouses
        type: Warehouse
        multiplicity: OneToMany

  - name: ProductionLine

    data:
      - name: name
        type: String
      - name: lineType
        type: ProductionLineType

    relations:
      - name: plant
        type: Plant
        multiplicity: ManyToOne

      - name: workCenters
        type: WorkCenter
        multiplicity: OneToMany

  - name: WorkCenter

    data:
      - name: name
        type: String
      - name: capability
        type: String

    relations:
      - name: productionLine
        type: ProductionLine
        multiplicity: ManyToOne

  - name: ProductionOrder

    data:
      - name: orderNumber
        type: String
      - name: status
        type: ProductionOrderStatus

    relations:
      - name: configuration
        type: VehicleConfiguration
        multiplicity: ManyToOne

      - name: plant
        type: Plant
        multiplicity: ManyToOne

  - name: BuildSchedule

    data:
      - name: scheduleNumber
        type: String
      - name: status
        type: ScheduleStatus

    relations:
      - name: productionOrders
        type: ProductionOrder
        multiplicity: OneToMany

  - name: Warehouse

    data:
      - name: name
        type: String

    relations:
      - name: inventoryItems
        type: InventoryItem
        multiplicity: OneToMany

  - name: InventoryItem

    data:
      - name: quantityOnHand
        type: Integer
      - name: quantityReserved
        type: Integer

    relations:
      - name: component
        type: Component
        multiplicity: ManyToOne

      - name: warehouse
        type: Warehouse
        multiplicity: ManyToOne

  - name: Dealer

    data:
      - name: name
        type: String
      - name: dealerCode
        type: String

    relations:
      - name: brand
        type: Brand
        multiplicity: ManyToOne

      - name: salesTerritory
        type: SalesTerritory
        multiplicity: ManyToOne

      - name: inventory
        type: Vehicle
        multiplicity: OneToMany

  - name: SalesTerritory

    data:
      - name: name
        type: String
      - name: region
        type: String

    relations:
      - name: dealers
        type: Dealer
        multiplicity: OneToMany

  - name: Customer

    data:
      - name: firstName
        type: String
      - name: lastName
        type: String
      - name: customerType
        type: CustomerType

    relations:
      - name: vehicleOrders
        type: VehicleOrder
        multiplicity: OneToMany

      - name: ownedVehicles
        type: Vehicle
        multiplicity: OneToMany

  - name: VehicleOrder

    data:
      - name: orderNumber
        type: String
      - name: status
        type: VehicleOrderStatus

    relations:
      - name: customer
        type: Customer
        multiplicity: ManyToOne

      - name: dealer
        type: Dealer
        multiplicity: ManyToOne

      - name: configuration
        type: VehicleConfiguration
        multiplicity: ManyToOne

      - name: quote
        type: Quote
        multiplicity: OneToOne

  - name: Quote

    data:
      - name: quoteNumber
        type: String
      - name: totalAmount
        type: Money

    relations:
      - name: vehicleOrder
        type: VehicleOrder
        multiplicity: OneToOne

  - name: FinancingAgreement

    data:
      - name: agreementNumber
        type: String
      - name: financingType
        type: FinancingType

    relations:
      - name: customer
        type: Customer
        multiplicity: ManyToOne

      - name: vehicle
        type: Vehicle
        multiplicity: OneToOne

  - name: Vehicle

    data:
      - name: vin
        type: VIN
      - name: productionDate
        type: Date

    relations:
      - name: configuration
        type: VehicleConfiguration
        multiplicity: ManyToOne

      - name: owner
        type: Customer
        multiplicity: ManyToOne

      - name: registration
        type: Registration
        multiplicity: OneToOne

      - name: warranty
        type: Warranty
        multiplicity: OneToOne

      - name: serviceRecords
        type: ServiceOrder
        multiplicity: OneToMany

      - name: connectedVehicle
        type: ConnectedVehicle
        multiplicity: OneToOne

  - name: Registration

    data:
      - name: registrationNumber
        type: String
      - name: jurisdiction
        type: String

    relations:
      - name: vehicle
        type: Vehicle
        multiplicity: OneToOne

  - name: Warranty

    data:
      - name: warrantyType
        type: WarrantyType
      - name: coverageMonths
        type: Integer

    relations:
      - name: vehicle
        type: Vehicle
        multiplicity: OneToOne

  - name: ServiceContract

    data:
      - name: contractNumber
        type: String
      - name: coverageLevel
        type: CoverageLevel

    relations:
      - name: vehicle
        type: Vehicle
        multiplicity: ManyToOne

  - name: ServiceCenter

    data:
      - name: name
        type: String

    relations:
      - name: appointments
        type: ServiceAppointment
        multiplicity: OneToMany

  - name: ServiceAppointment

    data:
      - name: appointmentDate
        type: Date
      - name: status
        type: AppointmentStatus

    relations:
      - name: vehicle
        type: Vehicle
        multiplicity: ManyToOne

      - name: serviceCenter
        type: ServiceCenter
        multiplicity: ManyToOne

      - name: serviceOrder
        type: ServiceOrder
        multiplicity: OneToOne

  - name: ServiceOrder

    data:
      - name: repairOrderNumber
        type: String
      - name: status
        type: ServiceOrderStatus

    relations:
      - name: vehicle
        type: Vehicle
        multiplicity: ManyToOne

      - name: recallCampaign
        type: RecallCampaign
        multiplicity: ManyToOne

  - name: RecallCampaign

    data:
      - name: campaignCode
        type: String
      - name: description
        type: String

    relations:
      - name: repairs
        type: RecallRepair
        multiplicity: OneToMany

  - name: RecallRepair

    data:
      - name: completionStatus
        type: RepairStatus

    relations:
      - name: recallCampaign
        type: RecallCampaign
        multiplicity: ManyToOne

      - name: vehicle
        type: Vehicle
        multiplicity: ManyToOne

  - name: ConnectedVehicle

    data:
      - name: telematicsProvider
        type: String
      - name: connectivityStatus
        type: ConnectivityStatus

    relations:
      - name: vehicle
        type: Vehicle
        multiplicity: OneToOne

      - name: diagnosticEvents
        type: DiagnosticEvent
        multiplicity: OneToMany

      - name: softwareUpdates
        type: SoftwareUpdate
        multiplicity: OneToMany

  - name: DiagnosticEvent

    data:
      - name: eventCode
        type: String
      - name: severity
        type: DiagnosticSeverity

    relations:
      - name: connectedVehicle
        type: ConnectedVehicle
        multiplicity: ManyToOne

  - name: SoftwareUpdate

    data:
      - name: version
        type: String
      - name: updateType
        type: SoftwareUpdateType

    relations:
      - name: connectedVehicle
        type: ConnectedVehicle
        multiplicity: ManyToOne

enums:

  - name: VehicleType
    data:
      - name: Sedan
      - name: Coupe
      - name: Hatchback
      - name: SUV
      - name: Truck
      - name: Van
      - name: Wagon
      - name: Crossover

  - name: FuelType
    data:
      - name: Gasoline
      - name: Diesel
      - name: Hybrid
      - name: Electric
      - name: Hydrogen

  - name: TransmissionType
    data:
      - name: Manual
      - name: Automatic
      - name: CVT
      - name: DualClutch

  - name: DrivetrainType
    data:
      - name: FWD
      - name: RWD
      - name: AWD
      - name: FourWD

  - name: SupplierTier
    data:
      - name: Tier1
      - name: Tier2
      - name: Tier3

  - name: MarketSegment
    data:
      - name: Economy
      - name: Premium
      - name: Luxury
      - name: Commercial

  - name: CustomerType
    data:
      - name: Retail
      - name: Fleet
      - name: Government

  - name: VehicleOrderStatus
    data:
      - name: Draft
      - name: Submitted
      - name: Scheduled
      - name: Built
      - name: Delivered
      - name: Cancelled

  - name: ProductionOrderStatus
    data:
      - name: Planned
      - name: Released
      - name: InProduction
      - name: Completed

  - name: WarrantyType
    data:
      - name: Basic
      - name: Powertrain
      - name: Corrosion
      - name: Emissions

valueObjects:

  - name: VIN
    data:
      - name: value
        type: String

  - name: Money
    data:
      - name: amount
        type: Decimal

      - name: currency
        type: String

  - name: Address
    data:
      - name: street
        type: String
      - name: city
        type: String
      - name: state
        type: String
      - name: postalCode
        type: String
      - name: country
        type: String