
  valueObjects:

    - name: "PersonName"
      data:
        - name: "firstName"
        - name: "middleName"
        - name: "lastName"

    - name: "Address"
      data:
        - name: "addressLine1"
        - name: "addressLine2"
        - name: "city"
        - name: "state"
        - name: "postalCode"
        - name: "country"

    - name: "ContactInformation"
      data:
        - name: "email"
        - name: "phoneNumber"

    - name: "DateRange"
      data:
        - name: "startDate"
        - name: "endDate"

    - name: "Money"
      data:
        - name: "amount"
        - name: "currency"

  entities:

    - name: "Patient"
      data:
        - name: "patientNumber"
        - name: "medicalRecordNumber"

      relations:
        - name: "encounters"
          type: "Encounter"
          multiplicity: "OneToMany"

        - name: "carePlans"
          type: "CarePlan"
          multiplicity: "OneToMany"

        - name: "insurancePolicies"
          type: "InsurancePolicy"
          multiplicity: "OneToMany"

    - name: "Provider"
      data:
        - name: "providerNumber"
        - name: "licenseNumber"

      relations:
        - name: "encounters"
          type: "Encounter"
          multiplicity: "OneToMany"

        - name: "appointments"
          type: "Appointment"
          multiplicity: "OneToMany"

    - name: "HealthcareOrganization"
      data:
        - name: "organizationCode"
        - name: "name"

    - name: "Encounter"
      data:
        - name: "encounterNumber"
        - name: "encounterDate"

      relations:
        - name: "patient"
          type: "Patient"
          multiplicity: "ManyToOne"

        - name: "provider"
          type: "Provider"
          multiplicity: "ManyToOne"

        - name: "diagnoses"
          type: "Diagnosis"
          multiplicity: "OneToMany"

        - name: "procedures"
          type: "Procedure"
          multiplicity: "OneToMany"

    - name: "Diagnosis"
      data:
        - name: "diagnosisCode"
        - name: "description"

    - name: "Procedure"
      data:
        - name: "procedureCode"
        - name: "description"

    - name: "Prescription"
      data:
        - name: "prescriptionNumber"

      relations:
        - name: "patient"
          type: "Patient"
          multiplicity: "ManyToOne"

        - name: "provider"
          type: "Provider"
          multiplicity: "ManyToOne"

    - name: "Medication"
      data:
        - name: "medicationCode"
        - name: "name"

    - name: "Appointment"
      data:
        - name: "appointmentNumber"

    - name: "CarePlan"
      data:
        - name: "carePlanNumber"

    - name: "InsurancePolicy"
      data:
        - name: "policyNumber"

    - name: "Claim"
      data:
        - name: "claimNumber"

    - name: "LabOrder"
      data:
        - name: "labOrderNumber"

    - name: "LabResult"
      data:
        - name: "resultNumber"

    - name: "Allergy"
      data:
        - name: "allergyCode"

  enums:

    - name: "EncounterType"
      data:
        - name: "OfficeVisit"
        - name: "Emergency"
        - name: "Telehealth"
        - name: "Inpatient"

    - name: "AppointmentStatus"
      data:
        - name: "Scheduled"
        - name: "Completed"
        - name: "Cancelled"

    - name: "ClaimStatus"
      data:
        - name: "Submitted"
        - name: "Approved"
        - name: "Denied"

    - name: "PatientStatus"
      data:
        - name: "Active"
        - name: "Inactive"
        - name: "Deceased"
    
