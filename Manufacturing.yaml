        type: MachineStatus

    relations:
      - name: workCenter
        type: WorkCenter
        multiplicity: ManyToOne

      - name: maintenanceRecords
        type: MaintenanceRecord
        multiplicity: OneToMany

  - name: Product

    data:
      - name: sku
        type: String
      - name: name
        type: String
      - name: productType
        type: ProductType

    relations:
      - name: billOfMaterial
        type: BillOfMaterial
        multiplicity: OneToOne

      - name: routings
        type: Routing
        multiplicity: OneToMany

  - name: ProductFamily

    data:
      - name: name
        type: String

    relations:
      - name: products
        type: Product
        multiplicity: OneToMany

  - name: BillOfMaterial

    data:
      - name: version
        type: String

    relations:
      - name: product
        type: Product
        multiplicity: OneToOne

      - name: materials
        type: Material
        multiplicity: ManyToMany

  - name: Material

