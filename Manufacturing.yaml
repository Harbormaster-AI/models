enums:

  - name: ProductType
    data:
      - name: FinishedGood
      - name: Assembly
      - name: SubAssembly

  - name: MaterialType
    data:
      - name: RawMaterial
      - name: Component
      - name: Packaging

  - name: MachineStatus
    data:
      - name: Available
      - name: Running
      - name: Maintenance
      - name: Offline

  - name: WorkOrderStatus
    data:
      - name: Planned
      - name: Released
      - name: InProgress
      - name: Completed
      - name: Cancelled

  - name: InspectionResult
    data:
      - name: Pass
      - name: Fail
      - name: ConditionalPass

valueObjects:

  - name: Quantity
    data:
      - name: amount
        type: Decimal
      - name: unitOfMeasure
        type: String

  - name: Money
    data:
      - name: amount
        type: Decimal
      - name: currency
        type: String

  - name: Address
    data:
      - name: street
        type: String
      - name: city
        type: String
      - name: state
        type: String
      - name: postalCode
        type: String
      - name: country
        type: String