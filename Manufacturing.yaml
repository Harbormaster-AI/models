entities:

  - name: Manufacturer
    description: Organization responsible for producing manufactured products.

    data:
      - name: name
        type: String
      - name: legalName
        type: String

    relations:
      - name: factories
        type: Factory
        multiplicity: OneToMany

      - name: suppliers
        type: Supplier
        multiplicity: ManyToMany

      - name: products
        type: Product
        multiplicity: OneToMany

  - name: Factory

    data:
      - name: name
        type: String
      - name: factoryCode
        type: String

    relations:
      - name: manufacturer
        type: Manufacturer
        multiplicity: ManyToOne

      - name: productionLines
        type: ProductionLine
        multiplicity: OneToMany

      - name: warehouses
        type: Warehouse
        multiplicity: OneToMany

  - name: ProductionLine

    data:
      - name: name
        type: String
      - name: lineType
        type: ProductionLineType

    relations:
      - name: factory
        type: Factory
        multiplicity: ManyToOne

      - name: workCenters
        type: WorkCenter
        multiplicity: OneToMany

      - name: productionSchedules
        type: ProductionSchedule
        multiplicity: OneToMany

  - name: WorkCenter

    data:
      - name: name
        type: String
      - name: capability
        type: String

    relations:
      - name: productionLine
        type: ProductionLine
        multiplicity: ManyToOne

      - name: machines
        type: Machine
        multiplicity: OneToMany

  - name: Machine

    data:
