
  entities:
    - name: "Customer"
      data:
        - name: "customerNumber"
        - name: "email"

    - name: "Catalog"
      data:
        - name: "name"
        - name: "description"
      relations:
        - name: "products"
          type: "Product"
          multiplicity: "OneToMany"

    - name: "Product"
      data:
        - name: "sku"
        - name: "name"
        - name: "price"

    - name: "Cart"
      data:
        - name: "createdDate"
      relations:
        - name: "customer"
          type: "Customer"
          multiplicity: "OneToOne"
        - name: "items"
          type: "CartItem"
          multiplicity: "OneToMany"

    - name: "CartItem"
      data:
        - name: "quantity"
      relations:
        - name: "cart"
          type: "Cart"
          multiplicity: "ManyToOne"
        - name: "product"
          type: "Product"
          multiplicity: "ManyToOne"

    - name: "Order"
      data:
        - name: "orderNumber"
        - name: "orderDate"

    - name: "Payment"
      data:
        - name: "amount"
        - name: "type"
          type: "PaymentType"

    - name: "Shipment"
      data:
        - name: "trackingNumber"
        - name: "carrier"

  enums:
    - name: "PaymentType"
      data:
        - name: "CreditCard"
        - name: "ACH"
        - name: "PayPal"
        - name: "Crypto"
    
